[pytest]
# Pytest configuration for Data Analyst Agent Integration Testing

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths =
    tests
    test_*.py

# Markers for test categorization
markers =
    unit: Unit tests for individual functions and tools
    integration: Integration tests for agent pairs and chains
    workflow: Sub-workflow tests for major features
    e2e: End-to-end workflow tests
    edge_case: Edge case and error handling tests
    performance: Performance and load tests
    slow: Tests that take more than 5 seconds
    requires_tableau: Tests that require Tableau A2A agents
    requires_db: Tests that require SQL Server database
    requires_llm: Tests that require LLM API calls
    csv_mode: Tests using CSV test data
    mock: Tests using mock data only
    requires_a2a: Tests that require live A2A server at localhost:8001
    ops_metrics: Tests using ops_metrics contract/data
    account_research: Tests using account_research contract/data
    insight_quality: Tests that validate insight value/quality
    trade_data: Tests using trade_data contract/data
    smoke: Fast regression smoke checks

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra
    --durations=10

# filterwarnings removed - all warnings should be visible and fixed, not suppressed
# If warnings appear, fix them rather than hiding them
# filterwarnings =
#     ignore::pytest.PytestUnraisableExceptionWarning
#     ignore::ResourceWarning

# Coverage options (if pytest-cov is installed)
# --cov=data_analyst_agent
# --cov-report=html
# --cov-report=term-missing

# Asyncio
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/test_execution.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] [%(filename)s:%(lineno)d] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout (if pytest-timeout is installed)
# timeout = 300
# timeout_method = thread

pythonpath = .

# Ignore patterns
norecursedirs =
    .git
    .venv
    venv
    env
    __pycache__
    *.egg-info
    build
    dist
    outputs
    logs

# Minimum Python version
minversion = 3.9

# Coverage configuration
[coverage:run]
source = data_analyst_agent
omit =
    */tests/*
    */venv/*
    */.venv/*
    */site-packages/*
    */conftest.py

[coverage:report]
precision = 2
skip_empty = True
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
