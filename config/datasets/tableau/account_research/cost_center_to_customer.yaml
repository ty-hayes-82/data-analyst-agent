# Cost Center to Customer Code Mapping
# =====================================
# Used by contract_validation_workflow to query AS400 for contracted rates
#
# Format: cost_center: customer_code
# - Set customer_code to null if mapping is unknown (AS400 validation will be skipped)
# - Update this file as mappings are discovered
#
# To override via CLI: Set environment variable CUSTOMER_CODE_OVERRIDE
# Example: export CUSTOMER_CODE_OVERRIDE="CUST12345"

mappings:
  # Primary cost centers (populate as discovered)
  "067": null  # TODO: Add customer code when available
  "385": null  # TODO: Add customer code when available
  "497": null  # TODO: Add customer code when available
  "550": null  # TODO: Add customer code when available
  "627": null  # TODO: Add customer code when available
  "683": null  # TODO: Add customer code when available
  
  # Additional cost centers can be added here
  # "XXX": "CUSTOMER_CODE"

# Fallback behavior when mapping is missing
fallback:
  skip_as400: true
  log_message: "AS400 validation skipped: unmapped cost center"
  continue_without_rates: true  # Continue with P&L and Ops Metrics analysis

# Optional: Attempt to infer customer from recent orders
# This provides a best-effort guess when mapping is unknown
inference:
  enabled: false  # Set to true to enable inference
  source: "order_dispatch_revenue_ds"
  lookback_days: 90  # Look at orders from last 90 days
  confidence_threshold: 0.8  # Require 80% of orders from same customer
  min_orders: 5  # Require at least 5 orders to infer

# CLI Override Support
# Set CUSTOMER_CODE_OVERRIDE environment variable to force a specific customer code
# This overrides all mappings above
# Example: CUSTOMER_CODE_OVERRIDE="TESTCUST" adk run .


