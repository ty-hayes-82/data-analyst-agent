# P&L Ratio Configuration (config-driven version of existing ratio logic)
# Used by compute_operational_ratios for P&L-based KPI analysis.

data_source: tableau_account_research_ds_agent

metrics:
  margin_pct:
    label: "Operating Margin %"
    direction: higher_is_better
    thresholds: { degradation_pct: 2.0, high_severity_pct: 5.0 }
  fuel_to_revenue_pct:
    label: "Fuel % of Revenue"
    direction: lower_is_better
    thresholds: { degradation_pct: 2.0, high_severity_pct: 5.0 }
  cost_to_revenue_pct:
    label: "Cost % of Revenue"
    direction: lower_is_better
    thresholds: { degradation_pct: 2.0, high_severity_pct: 5.0 }

account_classification:
  revenue_keywords: [revenue, sales, income]
  cost_keywords: [cost, expense, cogs]
  fuel_keywords: [fuel, surcharge]
