# Ratio metrics configuration for Ops Metrics
# Ensures aggregate-then-ratio calculation for summaries and drill-downs.

materiality_min_share: 0.005  # 0.5% share of network total denominator required

ratio_metrics:
  - metric_name: "Rev/Trk/Day"
    numerator_metric: "Revenue xFuel"
    denominator_metric: "Truck Count"
  - metric_name: "TRPM"
    numerator_metric: "Revenue xFuel"
    denominator_metric: "total_miles"
  - metric_name: "Avg LOH"
    numerator_metric: "ordr_miles"
    denominator_metric: "order_count"
  - metric_name: "Miles/Trk/Wk"
    numerator_metric: "total_miles"
    denominator_metric: "Truck Count"
  - metric_name: "Rev/Trk/Wk"
    numerator_metric: "Revenue xFuel"
    denominator_metric: "Truck Count"
  - metric_name: "LRPM"
    numerator_metric: "Revenue xFuel"
    denominator_metric: "Loaded Miles"
  - metric_name: "deadhead_pct"
    numerator_metric: "dh_miles"
    denominator_metric: "total_miles"
