source:
  type: "tableau_hyper"
  format: "long"

# TDSX / Hyper file location (relative to pl_analyst project root)
hyper:
  tdsx_file: "Ops Metrics DS.tdsx"
  tdsx_path: "data/tableau"
  default_table: "Extract.Extract"
  extract_dir: "temp_extracted/ops_metrics_weekly_v2"

# Filter column mappings: logical session-state key -> physical Hyper column.
# These are applied as SQL WHERE clauses on the raw Hyper data before aggregation.
filter_columns:
  lob: "ops_ln_of_bus_ref_nm"
  date: "cal_dt"
  cost_center: "icc_cst_ctr_cd"
  division: "div_cd"
  terminal: "gl_div_nm"
  region: "gl_rgn_nm"

# Pre-aggregation rules for the raw Ops Metrics Hyper file.
aggregation:
  period_type: "week_end"
  date_column: "cal_dt"
  period_alias: "period"

  group_by_columns:
    - "ops_ln_of_bus_ref_nm"    # Line of Business
    - "gl_rgn_nm"               # Region
    - "gl_div_nm"               # Terminal / Division (physical location)

  sum_columns:
    - "ttl_rev_amt"             # Total revenue
    - "fuel_srchrg_rev_amt"     # Fuel surcharge revenue
    - "ld_mi_less_swift_billto"  # Loaded miles (matching image logic)
    - "dh_miles"                # Deadhead miles
    - "ordr_cnt"                # Order count
    - "ordr_miles"              # Order miles (used for LOH in some cases)
    - "stop_count"              # Stop count
    - "dot_ocrnce_cnt"          # DOT incident count
    - "truck_count"             # Total trucks (to be averaged in derived_metrics)

  count_distinct_columns:
    - "cal_dt"                  # Actual day count in the dataset

  derived_metrics:
    - name: "total_revenue"
      sql: '"ttl_rev_amt"'
    - name: "Revenue xFuel"
      sql: '"ttl_rev_amt" - "fuel_srchrg_rev_amt"'
    - name: "total_miles"
      sql: '"ld_mi_less_swift_billto" + "dh_miles"'
    - name: "empty_miles"
      sql: '"dh_miles"'
    - name: "Truck Count"
      sql: 'CAST("truck_count" AS FLOAT) / NULLIF(CAST("cal_dt" AS FLOAT), 0)'
    - name: "deadhead_pct"
      sql: 'CASE WHEN ("ld_mi_less_swift_billto" + "dh_miles") > 0 THEN ("dh_miles" / ("ld_mi_less_swift_billto" + "dh_miles")) * 100.0 ELSE NULL END'
    - name: "Rev/Trk/Day"
      sql: 'CASE WHEN "truck_count" > 0 THEN ("ttl_rev_amt" - "fuel_srchrg_rev_amt") / CAST("truck_count" AS FLOAT) ELSE NULL END'
    - name: "TRPM"
      sql: 'CASE WHEN ("ld_mi_less_swift_billto" + "dh_miles") > 0 THEN ("ttl_rev_amt" - "fuel_srchrg_rev_amt") / ("ld_mi_less_swift_billto" + "dh_miles") ELSE NULL END'
    - name: "Avg LOH"
      sql: 'CASE WHEN "ordr_cnt" > 0 THEN "ordr_miles" / CAST("ordr_cnt" AS FLOAT) ELSE NULL END'
    - name: "Miles/Trk/Wk"
      sql: 'CASE WHEN "truck_count" > 0 THEN (("ld_mi_less_swift_billto" + "dh_miles") / CAST("truck_count" AS FLOAT)) * CAST("cal_dt" AS FLOAT) ELSE NULL END'
    - name: "Rev/Trk/Wk"
      sql: 'CASE WHEN "truck_count" > 0 THEN (("ttl_rev_amt" - "fuel_srchrg_rev_amt") / CAST("truck_count" AS FLOAT)) * CAST("cal_dt" AS FLOAT) ELSE NULL END'
    - name: "LRPM"
      sql: 'CASE WHEN "ld_mi_less_swift_billto" > 0 THEN ("ttl_rev_amt" - "fuel_srchrg_rev_amt") / "ld_mi_less_swift_billto" ELSE NULL END'

# Column renaming: Hyper physical column name -> pipeline semantic name.
# Note: Physical columns in sum_columns/avg_columns are passed through with their names.
# Derived metrics are created with their 'name' directly.
column_mapping:
  period: "cal_dt"
  cal_dt: "days_in_period"
  ops_ln_of_bus_ref_nm: "lob"
  gl_rgn_nm: "region"
  gl_div_nm: "terminal"
  drvr_mgr_cd: "driver_leader"
  flt_mgr_cd: "fleet_leader"
  icc_cst_ctr_cd: "dimension_value"
  div_cd: "division_code"
  # Note: The following renames are removed to avoid collisions with derived metrics of the same name.
  # Physical columns like ttl_rev_amt will still be available in the df as 'ttl_rev_amt'.
  fuel_srchrg_rev_amt: "fuel_surcharge"
  ld_mi_less_swift_billto: "Loaded Miles"
  dot_ocrnce_cnt: "dot_incidents"
  ordr_cnt: "order_count"
  stop_count: "stop_count"

date_parsing:
  source_column: "cal_dt"
  input_format: "%Y-%m-%d"
  output_column: "cal_dt"
  output_format: "%Y-%m-%d"

output_columns:
  - "cal_dt"
  - "lob"
  - "region"
  - "terminal"
  - "driver_leader"
  - "fleet_leader"
  - "dimension_value"
  - "division_code"
  - "total_revenue"
  - "Revenue xFuel"
  - "fuel_surcharge"
  - "Loaded Miles"
  - "total_miles"
  - "empty_miles"
  - "dh_miles"
  - "order_count"
  - "ordr_miles"
  - "stop_count"
  - "Truck Count"
  - "days_in_period"
  - "dot_incidents"
  - "deadhead_pct"
  - "Rev/Trk/Day"
  - "TRPM"
  - "Avg LOH"
  - "Miles/Trk/Wk"
  - "Rev/Trk/Wk"
  - "LRPM"
