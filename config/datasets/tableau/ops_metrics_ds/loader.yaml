source:
  type: tableau_hyper
  format: long

hyper:
  tdsx_file: "Ops Metrics DS.tdsx"
  tdsx_path: "data/tableau"
  default_table: "Extract.Extract"
  extract_dir: "data/tableau/extracted/ops_metrics_ds"

filter_columns:
  region: "gl_rgn_nm"
  division: "gl_div_nm"
  lob: "ops_ln_of_bus_ref_nm"
  lob_detail: "ops_ln_of_bus_nm"
  cost_center: "icc_cst_ctr_cd"
  date: "cal_dt"

aggregation:
  period_type: week_end
  date_column: "cal_dt"
  period_alias: "cal_dt"
  group_by_columns:
    - "gl_rgn_nm"
    - "gl_div_nm"
    - "drvr_mgr_cd"
    - "ops_ln_of_bus_ref_nm"
    - "ops_ln_of_bus_nm"
    - "icc_cst_ctr_cd"
    - "icc_cst_ctr_nm"
  sum_columns:
    # Revenue
    - "ttl_rev_amt"
    - "lh_rev_amt"
    - "fuel_srchrg_rev_amt"
    - "acsrl_rev_amt"
    # Volume / Orders
    - "ordr_cnt"
    - "ordr_miles"
    - "stop_count"
    # Miles
    - "ttl_trf_mi"
    - "ld_trf_mi"
    - "ld_mi_less_swift_billto"
    - "dh_miles"
    - "auth_trf_mi"
    # Truck counts
    - "truck_count"
    - "solo_truck_count"
    - "team_truck_count"
    - "mentor_truck_count"
    - "company_truck_count"
    - "oo_truck_count"
    - "unmanned_truck_count"
    - "inactive_truck_count"
    - "inactive_oo_truck_count"
    - "non_operational_truck_count"
    # Driver counts
    - "exprncd_drvr_cnt"
    - "actv_drvr_cnt"
    - "mntr_drvr_cnt"
    - "stdnt_drvr_cnt"
    - "trmntd_drvr_cnt"
    - "rnstd_drvr_cnt"
    # Driver time
    - "drvg_min"
    - "on_dty_min"
    - "drvr_engn_tm"
    - "idle_engn_tm"
    # Driver pay
    - "driver_layover_paid"
    - "driver_exception_paid"
    - "driver_pay_ttl_paid"
    # Fuel
    - "ttl_fuel_qty"
    - "idle_fuel_qty"
    - "drvng_fuel_qty"
    # Safety
    - "ocrnce_cnt"
    - "dot_ocrnce_cnt"
    - "prvntbl_ocrnce_cnt"
    # Period day counts (for annualization)
    - "wk_day_cnt"

date_parsing:
  source_column: "cal_dt"
  input_format: "%Y-%m-%d %H:%M:%S"
  output_column: "cal_dt"
  output_format: "%Y-%m-%d"

output_columns:
  - "cal_dt"
  - "gl_rgn_nm"
  - "gl_div_nm"
  - "drvr_mgr_cd"
  - "ops_ln_of_bus_ref_nm"
  - "ops_ln_of_bus_nm"
  - "icc_cst_ctr_cd"
  - "icc_cst_ctr_nm"
  # Revenue
  - "ttl_rev_amt"
  - "lh_rev_amt"
  - "fuel_srchrg_rev_amt"
  - "acsrl_rev_amt"
  # Volume / Orders
  - "ordr_cnt"
  - "ordr_miles"
  - "stop_count"
  # Miles
  - "ttl_trf_mi"
  - "ld_trf_mi"
  - "ld_mi_less_swift_billto"
  - "dh_miles"
  - "auth_trf_mi"
  # Truck counts
  - "truck_count"
  - "solo_truck_count"
  - "team_truck_count"
  - "mentor_truck_count"
  - "company_truck_count"
  - "oo_truck_count"
  - "unmanned_truck_count"
  - "inactive_truck_count"
  - "inactive_oo_truck_count"
  - "non_operational_truck_count"
  # Driver counts
  - "exprncd_drvr_cnt"
  - "actv_drvr_cnt"
  - "mntr_drvr_cnt"
  - "stdnt_drvr_cnt"
  - "trmntd_drvr_cnt"
  - "rnstd_drvr_cnt"
  # Driver time
  - "drvg_min"
  - "on_dty_min"
  - "drvr_engn_tm"
  - "idle_engn_tm"
  # Driver pay
  - "driver_layover_paid"
  - "driver_exception_paid"
  - "driver_pay_ttl_paid"
  # Fuel
  - "ttl_fuel_qty"
  - "idle_fuel_qty"
  - "drvng_fuel_qty"
  # Safety
  - "ocrnce_cnt"
  - "dot_ocrnce_cnt"
  - "prvntbl_ocrnce_cnt"
  # Period
  - "wk_day_cnt"
