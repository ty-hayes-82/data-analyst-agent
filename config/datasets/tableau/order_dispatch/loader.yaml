source:
  type: "tableau_hyper"
  format: "long"

hyper:
  tdsx_file: "Order Dispatch Revenue DS.tdsx"
  tdsx_path: "."
  default_table: "Extract.Extract"
  extract_dir: "temp_extracted/order_dispatch"

filter_columns:
  date: "empty_call_dt"
  cost_center: "icc_cst_ctr_cd"
  lob: "shpr_lob"
  division: "gl_div_nm"

aggregation:
  period_type: "month_end"
  date_column: "empty_call_dt"
  period_alias: "period_end_date"

  group_by_columns:
    - "ops_ln_of_bus_nm"
    - "shpr_lob"
    - "gl_div_nm"
    - "icc_cst_ctr_cd"
    - "icc_cst_ctr_nm"
    - "gl_regn_nm"
    - "segment"

  sum_columns:
    - "price_adjusted_price_score_ordr_miles"
    - "gdln_rev_amt"
    - "ttl_est_rev_amt"
    - "lh_amt"
    - "toll_revenue"
    - "toll_expense"
    - "negotiated_flat_amount"
    - "loaded_miles"
    - "empty_miles"
    - "order_count"

  derived_metrics:
    - name: "total_miles"
      sql: '"loaded_miles" + "empty_miles"'
    - name: "deadhead_pct"
      sql: 'CASE WHEN ("loaded_miles" + "empty_miles") > 0 THEN "empty_miles" / ("loaded_miles" + "empty_miles") * 100.0 ELSE NULL END'
    - name: "revenue_per_loaded_mile"
      sql: 'CASE WHEN "loaded_miles" > 0 THEN "ttl_est_rev_amt" / "loaded_miles" ELSE NULL END'
    - name: "revenue_per_order"
      sql: 'CASE WHEN "order_count" > 0 THEN "ttl_est_rev_amt" / "order_count" ELSE NULL END'

column_mapping:
  period_end_date: "empty_call_dt"
  ops_ln_of_bus_nm: "lob"
  shpr_lob: "shipper_lob"
  gl_div_nm: "division"
  icc_cst_ctr_cd: "dimension_value"
  icc_cst_ctr_nm: "cost_center_name"
  gl_regn_nm: "region"
  segment: "segment"
  ttl_est_rev_amt: "total_revenue"
  lh_amt: "linehaul_amount"
  toll_expense: "toll_expense"
  toll_revenue: "toll_revenue"
  loaded_miles: "loaded_miles"
  empty_miles: "empty_miles"
  order_count: "order_count"

date_parsing:
  source_column: "empty_call_dt"
  input_format: "%Y-%m-%d"
  output_column: "empty_call_dt"
  output_format: "%Y-%m-%d"

output_columns:
  - "empty_call_dt"
  - "dimension_value"
  - "cost_center_name"
  - "shipper_lob"
  - "division"
  - "region"
  - "segment"
  - "total_revenue"
  - "linehaul_amount"
  - "toll_expense"
  - "toll_revenue"
  - "loaded_miles"
  - "empty_miles"
  - "order_count"
  - "total_miles"
  - "deadhead_pct"
  - "revenue_per_loaded_mile"
  - "revenue_per_order"
