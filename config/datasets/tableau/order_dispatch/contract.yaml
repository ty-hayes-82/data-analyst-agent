name: "Order Dispatch Revenue"
version: "1.0.0"
display_name: "Order Dispatch Detail"
target_label: "Order Type"
description: "Order-level dispatch and revenue data"

materiality:
  variance_pct: 10.0
  variance_absolute: 1000

presentation:
  unit: "USD"

reporting:
  max_drill_depth: 3
  executive_brief_drill_levels: 1
  max_scope_entities: 10
  output_format: "pdf"

data_source:
  type: "tableau_hyper"
  tdsx_file: "Order Dispatch Revenue DS.tdsx"
  tdsx_path: "data/tableau"
  default_table: "Extract.Extract"

time:
  column: "empty_call_dt"
  frequency: "daily"
  format: "%Y-%m-%d"
  range_months: 3

grain:
  columns: ["empty_call_dt", "dimension_value"]

metrics:
  - name: "total_revenue"
    column: "total_revenue"
    type: "additive"
    format: "currency"
    optimization: "maximize"
    tags: ["financial", "revenue"]
  - name: "linehaul_amount"
    column: "linehaul_amount"
    type: "additive"
    format: "currency"
    optimization: "maximize"
  - name: "toll_expense"
    column: "toll_expense"
    type: "additive"
    format: "currency"
    optimization: "minimize"
    tags: ["expense", "toll"]
  - name: "toll_revenue"
    column: "toll_revenue"
    type: "additive"
    format: "currency"
    optimization: "maximize"
    tags: ["revenue", "toll"]
  - name: "loaded_miles"
    column: "loaded_miles"
    type: "additive"
    format: "float"
    optimization: "maximize"
    pvm_role: "volume"
  - name: "empty_miles"
    column: "empty_miles"
    type: "additive"
    format: "float"
    optimization: "minimize"
  - name: "order_count"
    column: "order_count"
    type: "additive"
    format: "integer"
    optimization: "maximize"
  - name: "total_miles"
    type: "derived"
    depends_on: ["loaded_miles", "empty_miles"]
    format: "float"
    optimization: "maximize"
  - name: "deadhead_pct"
    type: "derived"
    depends_on: ["loaded_miles", "empty_miles"]
    format: "percent"
    optimization: "minimize"
  - name: "revenue_per_loaded_mile"
    type: "derived"
    depends_on: ["total_revenue", "loaded_miles"]
    format: "float"
    optimization: "maximize"

dimensions:
  - name: "dimension_value"
    column: "dimension_value"
    role: "primary"
    description: "ICC cost center code"
  - name: "cost_center_name"
    column: "cost_center_name"
    role: "secondary"
  - name: "shipper_lob"
    column: "shipper_lob"
    role: "secondary"
  - name: "division"
    column: "division"
    role: "secondary"
  - name: "region"
    column: "region"
    role: "secondary"
  - name: "segment"
    column: "segment"
    role: "secondary"

hierarchies:
  - name: "dispatch_structure"
    children: ["region", "division", "dimension_value"]
    level_names:
      0: "Total"
      1: "Region"
      2: "Division"
      3: "Cost Center"

policies:
  toll_analysis:
    enabled: true
    min_expense: 100
  high_empty_mile_threshold: 0.15
