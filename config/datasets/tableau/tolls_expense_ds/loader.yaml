source:
  type: tableau_hyper
  format: long

hyper:
  tdsx_file: "Tolls Expense.tdsx"
  tdsx_path: "data/tableau"
  default_table: "Extract.Extract"
  extract_dir: "data/tableau/extracted/tolls_expense_ds"

filter_columns:
  empty_call_dt: "empty_call_dt"
  exit_ts: "exit_ts"
  lob: "ops_ln_of_bus_ref_nm"
  region: "region"
  terminal: "terminal"
  cost_center: "icc_cst_ctr_cd"
  cost_center_name: "icc_cst_ctr_nm"
  driver_leader: "drvr_ldr"
  fleet_leader: "flt_ldr"
  unit: "unit_cd"
  driver: "drvr_1_cd"
  owner_operator: "ownr_oprtr_flg"
  dh_flag: "dh_order_flg"
  exit_plaza: "exit_plaza"
  exit_plaza_agency: "exit_plaza_agency"
  shipper: "shpr_nm"
  shipper_parent: "shpr_prnt_nm"
  billed_status: "billed_status"
  stop_route_customer: "stop_location_w_cust"
  stop_location: "stop_location"
  ordr_nbr: "ordr_nbr"
  disp_nbr: "disp_nbr"

aggregation:
  period_type: day
  date_column: "empty_call_dt"
  period_alias: "empty_call_dt"
  group_by_columns:
    - "ordr_nbr"
    - "disp_nbr"
    - "unit_cd"
    - "bol_nbr"
    - "po_nbr"
    - "route_ln"
    - "orig_cty_nm"
    - "orig_st_cd"
    - "orig_area_cd"
    - "orig_mrkt"
    - "orig_planning_region_name"
    - "dest_cty_nm"
    - "dest_st_cd"
    - "shpr_cd"
    - "shpr_nm"
    - "shpr_prnt_nm"
    - "dest_area_cd"
    - "dest_mrkt"
    - "dest_planning_region_name"
    - "disp_dest_mrkt"
    - "exit_plaza"
    - "exit_plaza_agency"
    - "exit_dt"
    - "Entry_Time"
    - "Agency_Used"
    - "drvr_1_cd"
    - "ownr_oprtr_flg"
    - "drvr_ldr"
    - "flt_ldr"
    - "ops_ln_of_bus_ref_nm"
    - "icc_cst_ctr_cd"
    - "dh_order_flg"
    - "icc_cst_ctr_nm"
    - "region"
    - "terminal"
    - "stop_location_w_cust"
    - "stop_location"
    - "billed_status"
  sum_columns:
    - "toll_expense"
    - "recomm_toll_cost"
    - "toll_revenue"
    - "loaded_miles"
    - "empty_miles"
    - "ordr_miles"

date_parsing:
  source_column: "empty_call_dt"
  input_format: "%Y-%m-%d %H:%M:%S"
  output_column: "empty_call_dt"
  output_format: "%Y-%m-%d"

output_columns:
  - "ordr_nbr"
  - "disp_nbr"
  - "unit_cd"
  - "bol_nbr"
  - "po_nbr"
  - "route_ln"
  - "orig_cty_nm"
  - "orig_st_cd"
  - "empty_call_dt"
  - "orig_area_cd"
  - "orig_mrkt"
  - "orig_planning_region_name"
  - "dest_cty_nm"
  - "dest_st_cd"
  - "shpr_cd"
  - "shpr_nm"
  - "shpr_prnt_nm"
  - "dest_area_cd"
  - "dest_mrkt"
  - "dest_planning_region_name"
  - "disp_dest_mrkt"
  - "exit_plaza"
  - "exit_plaza_agency"
  - "toll_expense"
  - "exit_dt"
  - "exit_ts"
  - "Entry_Time"
  - "Truck_Latitude"
  - "Truck_Longitude"
  - "Agency_Used"
  - "Plaza_Latitude"
  - "Plaza_Longitude"
  - "loaded_miles"
  - "ordr_miles"
  - "empty_miles"
  - "drvr_1_cd"
  - "ownr_oprtr_flg"
  - "drvr_ldr"
