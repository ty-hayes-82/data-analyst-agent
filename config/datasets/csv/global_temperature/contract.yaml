name: "global_temperature"
version: "1.0.0"
display_name: "Global Monthly Temperature Anomalies"
target_label: "Temperature Anomaly"
description: >
  NASA GISTEMP-style global surface temperature anomaly series with monthly
  observations dating back to 1850. Includes both global combined land-ocean
  (gcag) and land-only (ghcn) sources.
materiality:
  variance_pct: 5.0
  variance_absolute: 0.1
presentation:
  unit: "°C"
reporting:
  max_drill_depth: 1
  executive_brief_drill_levels: 1
  max_scope_entities: 12
  output_format: "pdf"
data_source:
  type: "csv"
  file: "data/public/global_temp_monthly.csv"
time:
  column: "Year"
  frequency: "monthly"
  format: "%Y-%m"
  range_months: 2040
grain:
  columns:
    - "Year"
    - "Source"
metrics:
  - name: "temperature_anomaly"
    column: "Mean"
    type: "non_additive"
    format: "float"
    optimization: "maximize"
    description: "Global surface temperature anomaly vs 1951-1980 baseline"
dimensions:
  - name: "temperature_source"
    column: "Source"
    role: "primary"
    description: "Data source identifier (gcag/ghcn)"
  - name: "year_month"
    column: "Year"
    role: "time"
    description: "Calendar year-month"
hierarchies:
  - name: "global_vs_source"
    description: "Compare aggregate anomaly to each data source"
    children: ["Source"]
    level_names:
      0: "gcag"
      1: "Source"
