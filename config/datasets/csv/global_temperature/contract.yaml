name: "Global Temperature"
version: "1.0.0"
display_name: "Global Land and Ocean Temperature Anomalies"
target_label: "Metric"
description: >
  Monthly global temperature anomalies from 1850 to present, sourced from NOAA's
  Global Climate at a Glance (GCAG) and GISTEMP datasets. Temperature anomalies
  represent deviations from the 20th century average baseline in degrees Celsius.

materiality:
  variance_pct: 5.0
  variance_absolute: 0.1

presentation:
  unit: "°C"

reporting:
  max_drill_depth: 2
  executive_brief_drill_levels: 2
  max_scope_entities: 20
  output_format: "pdf"

data_source:
  type: "csv"
  file: "data/public/global_temp_monthly.csv"

time:
  column: "Year"
  frequency: "monthly"
  format: "%Y-%m"
  range_months: 2124

grain:
  columns: ["Year", "Source"]

metrics:
  - name: "temperature_anomaly"
    column: "Mean"
    type: "ratio"
    format: "float"
    optimization: "minimize"
    tags: ["climate", "temperature", "anomaly"]
    description: "Global temperature anomaly (deviation from 20th century average)"

dimensions:
  - name: "year"
    column: "Year"
    role: "time"
    description: "Month in YYYY-MM format"
  - name: "temperature_source"
    column: "Source"
    role: "primary"
    description: "Data source (gcag=NOAA Global Climate at a Glance, gistemp=NASA GISS)"

hierarchies: []

capabilities:
  - "long-term climate trend analysis (1850-present)"
  - "monthly temperature anomaly tracking"
  - "multi-source comparative analysis"
  - "seasonal pattern detection"
  - "climate change acceleration analysis"
  - "decade-over-decade warming trends"

policies:
  degradation_threshold: 0.12
