name: "OWID CO2 Emissions"
version: "1.0.0"
display_name: "Our World in Data CO2 and Greenhouse Gas Emissions"
target_label: "Metric"
description: >
  Comprehensive CO2 and greenhouse gas emissions data by country from 1750 to present,
  compiled by Our World in Data. Includes production-based and consumption-based
  emissions, per capita metrics, and breakdowns by fossil fuel type (coal, gas, oil).

materiality:
  variance_pct: 10.0
  variance_absolute: 1000

presentation:
  unit: "million tonnes"

reporting:
  max_drill_depth: 2
  executive_brief_drill_levels: 2
  max_scope_entities: 20
  output_format: "pdf"

data_source:
  type: "csv"
  file: "data/public/owid_co2_data.csv"

time:
  column: "year"
  frequency: "yearly"
  format: "%Y"
  range_months: 3300

grain:
  columns: ["year", "country"]

metrics:
  - name: "co2"
    column: "co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "climate", "total"]
    description: "Annual production-based CO2 emissions (million tonnes)"
  - name: "coal_co2"
    column: "coal_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "coal", "fossil_fuel"]
    description: "Annual CO2 emissions from coal (million tonnes)"
  - name: "gas_co2"
    column: "gas_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "gas", "fossil_fuel"]
    description: "Annual CO2 emissions from gas (million tonnes)"
  - name: "oil_co2"
    column: "oil_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "oil", "fossil_fuel"]
    description: "Annual CO2 emissions from oil (million tonnes)"
  - name: "cement_co2"
    column: "cement_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "industrial"]
    description: "Annual CO2 emissions from cement production (million tonnes)"
  - name: "flaring_co2"
    column: "flaring_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "industrial"]
    description: "Annual CO2 emissions from gas flaring (million tonnes)"
  - name: "co2_per_capita"
    column: "co2_per_capita"
    type: "ratio"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "per_capita"]
    description: "Per capita CO2 emissions (tonnes per person)"
  - name: "population"
    column: "population"
    type: "additive"
    format: "integer"
    optimization: "neutral"
    tags: ["demographics"]
    description: "Country population"
  - name: "gdp"
    column: "gdp"
    type: "additive"
    format: "float"
    optimization: "maximize"
    tags: ["economic"]
    description: "GDP in constant 2011 international dollars"

dimensions:
  - name: "year"
    column: "year"
    role: "time"
    description: "Calendar year"
  - name: "country"
    column: "country"
    role: "primary"
    description: "Country or region name"
  - name: "iso_code"
    column: "iso_code"
    role: "secondary"
    description: "ISO 3166-1 alpha-3 country code"

hierarchies: []

capabilities:
  - "long-term emissions trend analysis (1750-present)"
  - "country-level CO2 emissions tracking"
  - "fossil fuel breakdown (coal/gas/oil)"
  - "per capita emissions analysis"
  - "emissions intensity vs GDP"
  - "cumulative historical emissions"
  - "multi-metric comparative analysis"

policies:
  degradation_threshold: 0.12
