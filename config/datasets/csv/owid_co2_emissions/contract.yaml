name: Global CO2 Emissions
version: 1.0.0
display_name: OWID Global CO2 & Greenhouse Gas Emissions
target_label: Metric
description: Annual CO2 and greenhouse gas emissions by country from Our World in
  Data. Covers 1750-2024 with 255 countries. Includes emissions by source (coal, oil,
  gas), per capita metrics, and cumulative totals.
materiality:
  variance_pct: 5.0
  variance_absolute: 10.0
presentation:
  unit: million tonnes CO2
reporting:
  max_drill_depth: 3
  executive_brief_drill_levels: 2
  max_scope_entities: 20
  output_format: pdf
data_source:
  type: csv
  file: data/public/owid_co2_data.csv
time:
  column: year
  frequency: yearly
  format: '%Y'
  range_months: 600
grain:
  columns:
  - year
  - country
  - iso_code
metrics:
- name: co2
  column: co2
  type: additive
  format: float
  optimization: minimize
  tags:
  - emissions
  - co2
  - total
  description: Annual CO2 emissions in million tonnes
- name: co2_per_capita
  column: co2_per_capita
  type: ratio
  format: float
  optimization: minimize
  tags:
  - emissions
  - co2
  - per_capita
  description: CO2 emissions per capita in tonnes
- name: coal_co2
  column: coal_co2
  type: additive
  format: float
  optimization: minimize
  tags:
  - emissions
  - coal
  description: Annual CO2 from coal in million tonnes
- name: oil_co2
  column: oil_co2
  type: additive
  format: float
  optimization: minimize
  tags:
  - emissions
  - oil
  description: Annual CO2 from oil in million tonnes
- name: gas_co2
  column: gas_co2
  type: additive
  format: float
  optimization: minimize
  tags:
  - emissions
  - gas
  description: Annual CO2 from gas in million tonnes
- name: population
  column: population
  type: additive
  format: integer
  optimization: maximize
  tags:
  - demographic
  description: Country population
- name: gdp
  column: gdp
  type: additive
  format: currency
  optimization: maximize
  tags:
  - economic
  description: Country GDP
dimensions:
- name: country
  column: country
  role: primary
  description: Country name
- name: iso_code
  column: iso_code
  role: secondary
  description: ISO 3166-1 alpha-3 country code
- name: year
  column: year
  role: time
  description: Year of observation
hierarchies:
- name: by_country
  description: Country-level emissions analysis
  children:
  - country
  level_names:
    0: Global
    1: Country
capabilities:
- annual emissions trend analysis by country
- emissions source breakdown (coal, oil, gas)
- per capita emissions comparison across countries
- historical emissions patterns over 270+ years
- GDP vs emissions correlation analysis
- cumulative emissions tracking
policies:
  degradation_threshold: 0.12
