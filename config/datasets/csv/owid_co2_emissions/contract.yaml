name: "owid_co2_emissions"
version: "1.0.0"
display_name: "Global CO2 Emissions"
target_label: "Metric"
description: >
  Aggregated CO2 emission metrics sourced from Our World In Data.
  Includes annual totals by country for long-horizon sustainability analysis.
materiality:
  variance_pct: 4.0
  variance_absolute: 1.0
presentation:
  unit: "tonnes"
reporting:
  max_drill_depth: 2
  executive_brief_drill_levels: 1
  max_scope_entities: 10
  output_format: "pdf"
data_source:
  type: "csv"
  file: "data/public/owid_co2_data.csv"
time:
  column: "year"
  frequency: "yearly"
  format: "%Y"
  range_months: 600
grain:
  columns: ["year", "country"]
metrics:
  - name: "co2"
    column: "co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    description: "Annual CO2 emissions in metric tonnes"
  - name: "coal_co2"
    column: "coal_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    description: "Coal-related CO2 emissions"
  - name: "gas_co2"
    column: "gas_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    description: "Gas-related CO2 emissions"
  - name: "oil_co2"
    column: "oil_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    description: "Oil-related CO2 emissions"
dimensions:
  - name: "country"
    column: "country"
    role: "primary"
    description: "Country name"
  - name: "year"
    column: "year"
    role: "time"
    description: "Calendar year"
hierarchies:
  - name: "geography"
    description: "Country level hierarchy"
    children: ["country"]
    level_names:
      0: "Total"
      1: "Country"
