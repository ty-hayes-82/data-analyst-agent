name: "OWID CO2 Emissions"
version: "1.0.0"
display_name: "Our World in Data - CO2 and Greenhouse Gas Emissions"
target_label: "Metric"
description: >
  Historical CO2 emissions and related climate data by country from Our World in Data.
  Contains annual emissions data from 1750-2024 covering 254 countries/regions with
  79 metrics including CO2 emissions, per capita values, cumulative totals, and GHG data.

materiality:
  variance_pct: 5.0
  variance_absolute: 100

presentation:
  unit: "tonnes"

reporting:
  max_drill_depth: 2
  executive_brief_drill_levels: 1
  max_scope_entities: 50
  output_format: "pdf"

data_source:
  type: "csv"
  file: "data/public/owid_co2_data.csv"

time:
  column: "year"
  frequency: "yearly"
  format: "%Y"
  range_months: 3300

grain:
  columns: ["year", "country"]

metrics:
  - name: "co2"
    column: "co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "climate", "co2"]
    description: "Annual total CO2 emissions (million tonnes)"
  - name: "coal_co2"
    column: "coal_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "climate", "co2", "coal"]
    description: "Annual CO2 emissions from coal (million tonnes)"
  - name: "gas_co2"
    column: "gas_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "climate", "co2", "gas"]
    description: "Annual CO2 emissions from gas (million tonnes)"
  - name: "oil_co2"
    column: "oil_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "climate", "co2", "oil"]
    description: "Annual CO2 emissions from oil (million tonnes)"
  - name: "co2_per_capita"
    column: "co2_per_capita"
    type: "non_additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "climate", "per_capita"]
    description: "Annual CO2 emissions per capita (tonnes)"
  - name: "population"
    column: "population"
    type: "additive"
    format: "integer"
    optimization: "neutral"
    tags: ["demographic"]
    description: "Total population"
  - name: "gdp"
    column: "gdp"
    type: "additive"
    format: "float"
    optimization: "maximize"
    tags: ["economic"]
    description: "Gross domestic product"

dimensions:
  - name: "country"
    column: "country"
    role: "primary"
    description: "Country or region name"
  - name: "iso_code"
    column: "iso_code"
    role: "secondary"
    description: "ISO 3166-1 alpha-3 country code"
  - name: "year"
    column: "year"
    role: "time"
    description: "Year of the data point"

hierarchies:
  - name: "geographic"
    description: "Geographic hierarchy by country"
    children: ["country"]
    level_names:
      0: "Total"
      1: "Country"

capabilities:
  - "long-term CO2 emissions trend analysis (1750-2024)"
  - "country-level emissions tracking"
  - "per capita emissions comparison"
  - "cross-country emissions comparison"
  - "population and GDP correlation analysis"

policies:
  degradation_threshold: 0.15
