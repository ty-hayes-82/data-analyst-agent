source:
  type: tableau_hyper
  format: long

hyper:
  tdsx_file: "Bookshop.tdsx"
  tdsx_path: "data/tableau"
  default_table: "Extract.Extract"
  extract_dir: "temp_extracted/bookshop"

filter_columns:
  genre: "Genre"
  publishing_house: "Publishing House"
  publisher_country: "Publisher Country"
  format: "Format"
  date: "Sale Date"

aggregation:
  period_type: month_end
  date_column: "Sale Date"
  period_alias: "period_end_date"
  group_by_columns:
    - "Genre"
    - "Publishing House"
    - "Publisher Country"
    - "Title"
    - "Format"
  sum_columns:
    - "Revenue"
    - "Price"
  avg_columns:
    - "Discount"
  count_distinct_columns:
    - "OrderID"
    - "ISBN"
  derived_metrics:
    - name: "avg_revenue_per_order"
      sql: 'CASE WHEN "OrderID" > 0 THEN "Revenue" / NULLIF("OrderID", 0) ELSE NULL END'

column_mapping:
  period_end_date: "Sale Date"

date_parsing:
  source_column: "Sale Date"
  input_format: "%Y-%m-%d"
  output_column: "Sale Date"
  output_format: "%Y-%m"

output_columns:
  - "Sale Date"
  - "Genre"
  - "Publishing House"
  - "Publisher Country"
  - "Title"
  - "Format"
  - "Revenue"
  - "Price"
  - "Discount"
  - "OrderID"
  - "ISBN"
