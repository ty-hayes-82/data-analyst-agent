name: "COVID-19 US Counties"
version: "1.0.0"
display_name: "COVID-19 Cases and Deaths by US County"
target_label: "Metric"
description: >
  Johns Hopkins COVID-19 daily time series data at county level for the United States.
  Tracks cumulative cases and deaths across all US counties from January 2020 onwards.
  Data includes geographic hierarchy (state -> county) with FIPS codes for unique identification.

materiality:
  variance_pct: 10.0
  variance_absolute: 100

presentation:
  unit: "count"

reporting:
  max_drill_depth: 3
  executive_brief_drill_levels: 2
  max_scope_entities: 20
  output_format: "pdf"

data_source:
  type: "csv"
  file: "data/public/us_counties_covid.csv"

time:
  column: "date"
  frequency: "daily"
  format: "%Y-%m-%d"
  range_months: 48

grain:
  columns: ["date", "state", "county"]

metrics:
  - name: "cases"
    column: "cases"
    type: "additive"
    format: "integer"
    optimization: "minimize"
    tags: ["health", "epidemiology", "cumulative"]
    description: "Cumulative confirmed COVID-19 cases"
  - name: "deaths"
    column: "deaths"
    type: "additive"
    format: "integer"
    optimization: "minimize"
    tags: ["health", "epidemiology", "mortality", "cumulative"]
    description: "Cumulative COVID-19 deaths"

dimensions:
  - name: "date"
    column: "date"
    role: "time"
    description: "Report date (daily grain)"
  - name: "county"
    column: "county"
    role: "secondary"
    description: "US county name"
  - name: "state"
    column: "state"
    role: "primary"
    description: "US state name"
  - name: "fips"
    column: "fips"
    role: "secondary"
    description: "5-digit FIPS code (unique county identifier)"

hierarchies:
  - name: "geographic"
    description: "Geographic drill-down: State -> County"
    children: ["state", "county"]
    level_names:
      0: "Total US"
      1: "State"
      2: "County"

capabilities:
  - "daily COVID-19 trend analysis"
  - "geographic drill-down from state to county level"
  - "multi-metric analysis (cases and deaths)"
  - "cumulative vs daily change tracking"
  - "state-level comparative analysis"
  - "county-level outbreak detection"
  - "mortality rate analysis"

policies:
  degradation_threshold: 0.12
