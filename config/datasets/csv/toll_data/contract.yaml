name: "Toll Data"
version: "1.0.0"
display_name: "Toll Analysis Data"
target_label: "Metric"
description: >
  Weekly toll expense and revenue per shipper and route.
  Sourced from data/toll_data.csv.

materiality:
  variance_pct: 10.0
  variance_absolute: 100

presentation:
  unit: "USD"

reporting:
  max_drill_depth: 2
  executive_brief_drill_levels: 1
  max_scope_entities: 10
  output_format: "pdf"

data_source:
  type: "csv"
  file: "data/toll_data.csv"

time:
  column: "week_ending"
  frequency: "weekly"
  format: "%Y-%m-%d"
  range_months: 12

grain:
  columns: ["week_ending", "shipper", "route", "metric"]

metrics:
  - name: "Toll Expense"
    column: "value"
    type: "additive"
    format: "currency"
    optimization: "minimize"
    lag_periods: 4
    tags: ["financial", "toll", "expense", "lagging"]
    description: "Toll expense amount in USD"
  - name: "Toll Revenue"
    column: "value"
    type: "additive"
    format: "currency"
    optimization: "maximize"
    tags: ["financial", "toll", "revenue"]
    description: "Toll revenue amount in USD"

dimensions:
  - name: "shipper_parent"
    column: "shipper_parent"
    role: "secondary"
  - name: "shipper"
    column: "shipper"
    role: "primary"
  - name: "route"
    column: "route"
    role: "secondary"
  - name: "route_detail"
    column: "route_detail"
    role: "secondary"
  - name: "metric"
    column: "metric"
    role: "secondary"
  - name: "week_ending"
    column: "week_ending"
    role: "time"

cross_dimensions:
  - name: "route"
    apply_at_levels: [1, 2]
    min_sample_size: 1
    max_cardinality: 50

hierarchies:
  - name: "shipper_hierarchy"
    description: "Shipper Parent -> Shipper -> Route Detail"
    children: ["shipper_parent", "shipper", "route_detail"]
    level_names:
      0: "Total"
      1: "Shipper Parent"
      2: "Shipper"
      3: "Route Detail"
