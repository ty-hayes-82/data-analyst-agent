name: US Airfare 2008-2025
version: 1.0.0
display_name: US Domestic Airfare Analysis
target_label: Metric
description: US domestic airfare data by route, carrier, and quarter (2008-2025). Tracks passengers, fares, market share, and competitive dynamics across major city pairs.

materiality:
  variance_pct: 10.0  # 10% threshold for fares
  variance_absolute: 15.0  # For passengers (15% threshold)

presentation:
  unit: passengers

reporting:
  max_drill_depth: 2
  executive_brief_drill_levels: 2
  max_scope_entities: 20
  output_format: pdf

data_source:
  type: csv
  file: data/public/us_airfare_2008_2025.csv

time:
  column: year_quarter  # Composite quarterly identifier
  frequency: quarterly
  format: "%Y_Q%d"
  range_months: 204  # 2008-2025 = 17 years = 204 months

grain:
  columns:
    - year
    - quarter
    - origin_city
    - destination_city

metrics:
  - name: passengers
    column: passengers
    type: additive
    format: float
    optimization: maximize
    tags: [volume, traffic]
    description: Average quarterly passengers on this route

  - name: avg_fare
    column: avg_fare
    type: ratio
    format: currency
    optimization: minimize
    tags: [price, revenue]
    description: Average fare paid per passenger (USD)

  - name: fare_per_mile
    column: fare_per_mile
    type: ratio
    format: float
    optimization: minimize
    tags: [efficiency, price]
    description: Average fare per mile flown (USD/mile)

  - name: distance_miles
    column: distance_miles
    type: additive
    format: integer
    optimization: neutral
    tags: [geography]
    description: Route distance in miles

  - name: largest_carrier_market_share
    column: largest_carrier_market_share
    type: ratio
    format: percentage
    optimization: neutral
    tags: [competition, market]
    description: Market share of the largest carrier on this route

  - name: largest_carrier_fare
    column: largest_carrier_fare
    type: ratio
    format: currency
    optimization: minimize
    tags: [price, competition]
    description: Average fare charged by the largest carrier (USD)

  - name: lowest_fare_carrier_share
    column: lowest_fare_carrier_share
    type: ratio
    format: percentage
    optimization: neutral
    tags: [competition, market]
    description: Market share of the lowest-fare carrier on this route

  - name: lowest_fare
    column: lowest_fare
    type: ratio
    format: currency
    optimization: minimize
    tags: [price, competition]
    description: Lowest average fare available on this route (USD)

dimensions:
  - name: year
    column: year
    role: time
    description: Calendar year (2008-2025)

  - name: quarter
    column: quarter
    role: time
    description: Calendar quarter (2, 3, 4)

  - name: year_quarter
    column: year_quarter
    role: primary
    description: Composite quarterly identifier (YYYY_QN)

  - name: origin_city
    column: origin_city
    role: primary
    description: Origin city and state (97 unique cities)

  - name: destination_city
    column: destination_city
    role: primary
    description: Destination city and state (86 unique cities)

  - name: largest_carrier
    column: largest_carrier
    role: secondary
    description: Carrier code with largest market share on this route (15 carriers)

  - name: lowest_fare_carrier
    column: lowest_fare_carrier
    role: secondary
    description: Carrier code offering lowest fare on this route (18 carriers)

hierarchies: []  # Flat route structure - no natural hierarchies

capabilities:
  - Quarterly time series analysis (2008-2025)
  - Route-level comparative analysis across 97 origin cities and 86 destinations
  - Carrier competition dynamics (market share vs pricing)
  - Multi-metric variance tracking (passengers, fares, market share)
  - Period-over-period change detection
  - Anomaly detection on routes and carriers

policies:
  degradation_threshold: 0.12
