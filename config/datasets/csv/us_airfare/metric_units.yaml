# Metric display units for US Airfare dataset

passengers:
  unit: passengers
  display_format: "{:,.0f}"
  description: Average quarterly passengers

avg_fare:
  unit: USD
  display_format: "${:,.2f}"
  description: Average fare per passenger

fare_per_mile:
  unit: USD per mile
  display_format: "${:.3f}/mi"
  description: Average fare per mile

distance_miles:
  unit: miles
  display_format: "{:,.0f} mi"
  description: Route distance

largest_carrier_market_share:
  unit: percent
  display_format: "{:.1%}"
  description: Market share of largest carrier

largest_carrier_fare:
  unit: USD
  display_format: "${:,.2f}"
  description: Average fare by largest carrier

lowest_fare_carrier_share:
  unit: percent
  display_format: "{:.1%}"
  description: Market share of lowest-fare carrier

lowest_fare:
  unit: USD
  display_format: "${:,.2f}"
  description: Lowest average fare available
