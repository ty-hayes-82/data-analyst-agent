name: "Global CO2 Emissions (Regions)"
version: "1.0.0"
display_name: "CO₂ Emissions by Region & Country"
target_label: "CO₂"
description: >
  Our World in Data CO₂ emissions enriched with UN region/sub-region metadata.
  Captures national totals and fuel-specific components (coal, gas, oil) from 1750
  onward, enabling multi-level geographic drill-downs.

materiality:
  variance_pct: 5.0
  variance_absolute: 1.0

presentation:
  unit: "million tonnes"

reporting:
  max_drill_depth: 3
  executive_brief_drill_levels: 2
  max_scope_entities: 12
  output_format: "pdf"

data_source:
  type: "csv"
  file: "data/public/owid_co2_data_enriched.csv"

time:
  column: "period_end"
  frequency: "yearly"
  format: "%Y-%m-%d"
  range_months: 324

grain:
  columns: ["period_end", "region", "sub_region", "country"]

metrics:
  - name: "co2"
    column: "co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "total"]
  - name: "coal_co2"
    column: "coal_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "coal"]
  - name: "gas_co2"
    column: "gas_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "gas"]
  - name: "oil_co2"
    column: "oil_co2"
    type: "additive"
    format: "float"
    optimization: "minimize"
    tags: ["emissions", "oil"]

dimensions:
  - name: "region"
    column: "region"
    role: "primary"
  - name: "sub_region"
    column: "sub_region"
    role: "secondary"
  - name: "country"
    column: "country"
    role: "secondary"
  - name: "iso_code"
    column: "iso_code"
    role: "secondary"
  - name: "period_end"
    column: "period_end"
    role: "time"

hierarchies:
  - name: "global_regions"
    description: "Region -> Sub-region -> Country drill"
    children: ["region", "sub_region", "country"]
    level_names:
      0: "Global"
      1: "Region"
      2: "Sub-region"
      3: "Country"

capabilities:
  - "Long-range trend analysis"
  - "Regional fuel-mix comparisons"
  - "Country level anomaly detection"
  - "Supports climate briefings"

policies:
  degradation_threshold: 0.08
