source:
  file: "data/public/owid_co2_data_enriched.csv"
  encoding: "utf-8"
  delimiter: ","
  format: "long"

column_mapping:
  country: "country"
  iso_code: "iso_code"
  region: "region"
  sub_region: "sub_region"
  period_end: "period_end"
  co2: "co2"
  coal_co2: "coal_co2"
  gas_co2: "gas_co2"
  oil_co2: "oil_co2"

numeric_columns: ["co2", "coal_co2", "gas_co2", "oil_co2"]

sort_columns: ["period_end", "region", "country"]

output_columns:
  - "period_end"
  - "region"
  - "sub_region"
  - "country"
  - "iso_code"
  - "co2"
  - "coal_co2"
  - "gas_co2"
  - "oil_co2"
