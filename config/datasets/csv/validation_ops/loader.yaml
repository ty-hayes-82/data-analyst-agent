source:
  file: "validation_data.csv"
  encoding: "utf-16"
  delimiter: "\t"
  format: "wide"

id_columns: ["Region", "Terminal", "Metric"]

melt:
  var_name: "week_ending_raw"
  value_name: "raw_value"

value_cleaning:
  strip_characters: ['"', '$', ',', '%']
  null_markers: ["-", "- ", "", "nan"]
  coerce: "numeric"

date_parsing:
  source_column: "week_ending_raw"
  input_format: "%m/%d/%Y"
  output_column: "week_ending"
  output_format: "%Y-%m-%d"

column_mapping:
  Region: "region"
  Terminal: "terminal"
  Metric: "metric"

partial_period:
  known_dates: ["2/21/2026"]

sort_columns: ["region", "terminal", "metric", "week_ending"]

output_columns: ["region", "terminal", "metric", "value", "week_ending"]
