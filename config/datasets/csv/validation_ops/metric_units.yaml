# Metric display units for Validation Ops dataset.
# Used by generate_markdown_report for variance formatting.
# unit: currency | miles | count | ratio
# suffix: optional display suffix (e.g. "miles", "trucks")

metrics:
  # Revenue and dollar-denominated
  "Revenue xFuel":
    unit: currency
    suffix: ""
  "Rev/Trk/Wk":
    unit: currency
    suffix: ""
  "LRPM":
    unit: currency
    suffix: ""
  "TRPM":
    unit: currency
    suffix: ""

  # Miles and distance
  "Loaded Miles":
    unit: miles
    suffix: "miles"
  "Total Miles":
    unit: miles
    suffix: "miles"
  "Total Miles/Trk/Wk":
    unit: miles
    suffix: "miles"

  # Counts
  "Truck Count":
    unit: count
    suffix: "trucks"
  "Seated Truck Count":
    unit: count
    suffix: "trucks"

  # Ratios / percentages (no $ prefix for variance display)
  "Turnover %":
    unit: ratio
    suffix: "%"
  "Deadhead %":
    unit: ratio
    suffix: "%"
