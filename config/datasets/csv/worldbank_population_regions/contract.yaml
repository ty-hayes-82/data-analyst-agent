name: "World Bank Population (Regions)"
version: "1.0.0"
display_name: "Population by Region & Country"
target_label: "Population"
description: >
  World Bank total population series enriched with UN region/sub-region columns.
  Covers 1960-present with annual cadence suitable for long-term demographic trend
  analysis.

materiality:
  variance_pct: 3.0
  variance_absolute: 100000

presentation:
  unit: "people"

reporting:
  max_drill_depth: 3
  executive_brief_drill_levels: 2
  max_scope_entities: 15
  output_format: "pdf"

data_source:
  type: "csv"
  file: "data/public/worldbank_population_enriched.csv"

time:
  column: "period_end"
  frequency: "yearly"
  format: "%Y-%m-%d"
  range_months: 768

grain:
  columns: ["period_end", "region", "sub_region", "country"]

metrics:
  - name: "population"
    column: "population"
    type: "additive"
    format: "float"
    optimization: "maximize"
    tags: ["demographics", "population"]

dimensions:
  - name: "region"
    column: "region"
    role: "primary"
  - name: "sub_region"
    column: "sub_region"
    role: "secondary"
  - name: "country"
    column: "country"
    role: "secondary"
  - name: "country_code"
    column: "country_code"
    role: "secondary"
  - name: "period_end"
    column: "period_end"
    role: "time"

hierarchies:
  - name: "region_drill"
    description: "Region -> Sub-region -> Country"
    children: ["region", "sub_region", "country"]
    level_names:
      0: "Global"
      1: "Region"
      2: "Sub-region"
      3: "Country"

capabilities:
  - "Annual demographic trend analysis"
  - "Regional drill-down"
  - "Growth/decline detection"

policies:
  degradation_threshold: 0.05
