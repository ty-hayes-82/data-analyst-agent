# Agent Dataset Configuration
# ============================
# Set active_dataset to the folder name under config/datasets/ that the pipeline
# should use. This is the single source of truth for dataset selection.
#
# Override at runtime without editing this file:
#   export ACTIVE_DATASET=ops_metrics
#
# Available datasets:
#   trade_data      - Synthetic hierarchical trade dataset (default and CI target)
#   validation_ops  - Legacy ops KPIs used for test fixtures only

active_dataset: trade_data
