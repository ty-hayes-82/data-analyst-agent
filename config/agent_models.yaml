default_tier: standard
model_tiers:
  lite:
    model: gemini-3-flash-preview
    thinking_level: none
    description: Gemini 3 Flash — ultra-fast for simple tasks
  ultra:
    model: gemini-2.5-flash-lite
    thinking_level: none
    description: Gemini 2.5 Flash Lite — ultra-fast fallback
  brief:
    model: gemini-3.1-flash-lite-preview
    thinking_level: none
    description: 'Gemini 3.1 Flash Lite — CEO brief winner: 3.8s, strong voice, 100%
      consistency across 3 runs'
  flash_2_5:
    model: gemini-2.5-flash
    thinking_level: none
    description: Gemini 2.5 Flash — no thinking
  flash_2_5_thinking:
    model: gemini-2.5-flash
    thinking_level: none
    description: Gemini 2.5 Flash — no thinking (ADK compat)
  fast:
    model: gemini-3-flash-preview
    thinking_level: medium
    description: Gemini 3 Flash — default thinking for analytical tasks
  standard:
    model: gemini-3-flash-preview
    thinking_level: none
    description: Gemini 3 Flash (No Thinking) — best standard model for production
  advanced:
    model: gemini-3-flash-preview
    thinking_level: high
    thinking_budget: 14000
    description: Gemini 3 Flash (Thinking) — high-quality reasoning (optimized budget)
  pro:
    model: gemini-3.1-pro-preview
    thinking_level: high
    description: Gemini 3.1 Pro — highest quality for final analysis
agents:
  request_analyzer:
    tier: lite
    description: Analyzes user request — schema-constrained, no thinking needed
    safe_tiers: &id001
    - lite
    - ultra
    - brief
    - flash_2_5
    - standard
  dimension_extractor:
    tier: lite
    description: Extracts dimension values — schema-constrained slot-filling
    safe_tiers: *id001
  narrative_agent:
    tier: brief
    description: Evaluates insight cards, writes per-metric narrative with causal
      and statistical evidence
    safe_tiers: *id001
  statistical_insights_agent:
    tier: standard
    description: Stats-first analysis (fallback only; replaced by StatisticalInsightCardGenerator
      when USE_CODE_INSIGHTS=true)
    safe_tiers: *id001
  hierarchical_analysis_agent:
    tier: pro
    description: Hierarchical drill-down orchestrator (Level 2->3->4)
    safe_tiers: &id002
    - lite
    - ultra
    - brief
    - flash_2_5
    - standard
    - fast
    - advanced
    - pro
  hierarchy_variance_agent:
    tier: standard
    description: Aggregates and ranks items by hierarchy level (fallback only; replaced
      by code-based ranker when USE_CODE_INSIGHTS=true)
    safe_tiers: *id001
  seasonal_baseline_agent:
    tier: pro
    description: Creates seasonal baselines from STL decomposition
  report_synthesis_agent:
    tier: pro
    description: Report synthesis from structured insight report — gemini-3-flash-preview
      (no thinking)
    safe_tiers: *id002
  alert_scoring_coordinator:
    tier: pro
    description: Complete alert lifecycle manager (extraction, suppression, scoring,
      prioritization)
    safe_tiers: *id002
  executive_brief_agent:
    tier: brief
    description: Cross-metric synthesis executive brief — gemini-3-flash-preview (Tier
      1 winner)
    safe_tiers: *id001
  executive_brief_hybrid_curator:
    tier: brief
    description: CEO hybrid Pass 1 — curate top signals (Flash-Lite)
    safe_tiers: *id001
  executive_brief_hybrid_synthesis:
    tier: pro
    description: CEO hybrid Pass 2 — Pro synthesis from curated signals
    safe_tiers: *id002
  output_persistence_agent:
    tier: lite
    description: Saves complete analysis to JSON files (file I/O, no reasoning)
    safe_tiers: &id003
    - lite
    - ultra
    - brief
    - flash_2_5
    - standard
  testing_data_agent:
    tier: lite
    description: Testing data loader (CSV) — code-backed, no LLM reasoning
    safe_tiers: *id003
  cost_center_iterator:
    tier: lite
    description: Iterates through cost centers for individual analysis — code-backed
      orchestration
    cost_centers: ${cost_centers}
    safe_tiers: *id003
  jira_agent:
    tier: fast
    description: Main Jira orchestrator agent
  jira_analytics_agent:
    tier: fast
    description: Analytics, summaries, counts, and rankings
  jira_issues_agent:
    tier: lite
    description: Single-issue details, comments, and attachments
  jira_query_agent:
    tier: fast
    description: Fetches sets of tickets via JQL or criteria
  jira_users_agent:
    tier: fast
    description: User discovery and fuzzy lookup
  jira_health_agent:
    tier: lite
    description: Readiness, health, and observability checks
  jira_learning_agent:
    tier: fast
    description: Learning and memory agent
  attachment_analyzer_agent:
    tier: fast
    description: Attachment analysis with vision capabilities
  browser_updater_agent:
    tier: fast
    description: Browser-based Jira ticket updater with automation
  project_manager_agent:
    tier: fast
    description: Intelligent project management analysis and recommendations
  cost_center_extractor:
    tier: lite
    description: Extracts cost center numbers from user request
  financial_data_agent:
    tier: fast
    description: Requests P&L data from Account Research DS
  ops_metrics_data_agent:
    tier: fast
    description: Requests monthly operational metrics from Ops Metrics DS
  order_details_data_agent:
    tier: fast
    description: Requests order-level detail for contract validation
