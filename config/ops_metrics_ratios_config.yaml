# Ops Metrics Ratio Definitions for Miles/Truck Utilization Deep-Dive
# Used by statistical analysis and hierarchy ranking agents for operational KPIs.

data_source: tableau_ops_metrics_ds_agent
primary_metric: miles_per_truck

metrics:
  miles_per_truck:
    label: "Miles/Truck/Week"
    formula: "loaded_miles / truck_count"
    columns: { numerator: ld_mi_less_swift_billto, denominator: truck_count }
    direction: higher_is_better
    thresholds:
      degradation_pct: 5.0
      high_severity_pct: 10.0
    tolerance: 0.05

  # Supporting metrics for drill-down context
  loaded_miles:
    label: "Loaded Miles"
    column: ld_mi_less_swift_billto
    aggregation: sum
    tolerance: 0.01
  truck_count:
    label: "Truck Count"
    column: truck_count
    aggregation: avg_daily
    tolerance: 0.05
  deadhead_pct:
    label: "Deadhead %"
    formula: "empty_miles / (empty_miles + loaded_miles) * 100"
    columns: { empty: empty_trf_mi, loaded: ld_mi_less_swift_billto }
    direction: lower_is_better
    thresholds: { degradation_pct: 2.0, high_severity_pct: 5.0 }
    tolerance: 0.02
  lrpm:
    label: "LRPM"
    formula: "(total_revenue - fuel_surcharge) / loaded_miles"
    columns: { revenue: ttl_rev_amt, fuel: fuel_srchrg_rev_amt, miles: ld_mi_less_swift_billto }
    direction: higher_is_better
    thresholds: { degradation_pct: 3.0, high_severity_pct: 7.0 }
    tolerance: 0.02
  orders_per_truck:
    label: "Orders/Truck"
    formula: "orders / truck_count"
    columns: { numerator: ordr_cnt, denominator: truck_count }
    direction: higher_is_better
    tolerance: 0.05

hierarchy:
  level_2: icc_cst_ctr_nm     # Cost Center / Location
  level_3: ops_ln_of_bus_nm    # Line of Business (Line Haul, Dedicated, etc.)
  level_4: null                # Individual truck/driver level (if available)

outlier_detection:
  method: stdev
  threshold: 1.5

sql_table: '"Extract"."Extract"'
date_column: empty_call_dt
location_column: icc_cst_ctr_nm
